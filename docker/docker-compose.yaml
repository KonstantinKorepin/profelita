services:
  php:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        UID: ${UID:-1000}
    container_name: profelita-php
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ..:/app
      - ./php/php.ini:/usr/local/etc/php/php.ini
    environment:
      PHP_IDE_CONFIG: "serverName=profelita"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - profelita
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: profelita-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ..:/app
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - profelita
    depends_on:
      - php

  db:
    image: mysql:8.0
    container_name: profelita-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: profelita
      MYSQL_ROOT_PASSWORD: pobeda
    working_dir: /app
    ports:
      - "3306:3306"
    volumes:
      - ..:/app
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      profelita:
        aliases:
          - db

volumes:
  mysql_data:

networks:
  profelita:
    driver: bridge
